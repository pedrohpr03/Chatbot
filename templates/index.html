<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBotMusic</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="shell">
  <div class="chat-area">
    <header class="chat-header">
      <div class="logo">
        <div class="logo-text">Chat<span>Bot</span>Music</div>
      </div>
      <div class="status">Online agora</div>
    </header>

    <div class="messages" id="messages">
      <div class="msg bot">
        <div class="bubble">Olá! Bem-vindo ao <strong>ChatBotMusic</strong>!
                            <br>Vamos falar sobre música? Pergunte sobre artistas, gêneros ou peça uma recomendação!</div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="user-input" rows="1" placeholder="Pergunte sobre música..."></textarea>
      </div>
      <button class="send-btn" onclick="sendMessage()" title="Enviar">➤</button>
    </div>
  </div>
</div>

<script>
  const input  = document.getElementById('user-input');
  const msgBox = document.getElementById('messages');

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function addMessage(text, role) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text.replace(/\n/g, '<br>');

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    msgBox.appendChild(wrap);
    msgBox.scrollTop = msgBox.scrollHeight;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.innerHTML = `<div class="msg-avatar"></div>
      <div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
    msgBox.appendChild(wrap);
    msgBox.scrollTop = msgBox.scrollHeight;
    return wrap;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    input.value = '';
    input.style.height = 'auto';

    const typing = addTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      typing.remove();
      addMessage(data.response, 'bot');
    } catch (err) {
      typing.remove();
      addMessage('Ops! Não consegui me conectar ao servidor. Verifique se o app.py está rodando.', 'bot');
    }
  }
</script>
</body>
</html>
